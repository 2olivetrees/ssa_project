{% extends 'chipin/base.html' %}
{% load static %}
{% block title %}Login - ChipIn{% endblock %}
{% block content %}
<div class="login-container"></div>
    <h1>Profile</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p>Current Balance: ${{ balance }}</p>
{% endblock %}
